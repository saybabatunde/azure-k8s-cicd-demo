apiVersion: v1
kind: ServiceAccount
metadata:
  name: azure-k8s-cicd-sa
  namespace: azure-k8s-cicd
  labels:
    app: azure-k8s-cicd-app
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: azure-k8s-cicd-role
  namespace: azure-k8s-cicd
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: azure-k8s-cicd-rolebinding
  namespace: azure-k8s-cicd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: azure-k8s-cicd-role
subjects:
- kind: ServiceAccount
  name: azure-k8s-cicd-sa
  namespace: azure-k8s-cicd
